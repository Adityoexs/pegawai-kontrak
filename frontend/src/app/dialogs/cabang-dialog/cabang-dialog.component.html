<h2 mat-dialog-title>{{ data.isEdit ? 'Edit Cabang' : 'Tambah Cabang' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Kode Cabang</mat-label>
      <input matInput formControlName="kodeCabang" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Nama Cabang</mat-label>
      <input matInput formControlName="namaCabang" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Batal</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">Simpan</button>
</mat-dialog-actions>
