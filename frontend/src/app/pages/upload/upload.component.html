<div class="page-header">
  <h2><mat-icon>upload_file</mat-icon> Upload Excel</h2>
  <button mat-raised-button class="btn-tambah" (click)="openUploadDialog()">
    <mat-icon>add</mat-icon>
    Upload File
  </button>
</div>

<mat-card>
  <mat-card-content>
    <table mat-table [dataSource]="files" class="full-width">
      <ng-container matColumnDef="no">
        <th mat-header-cell *matHeaderCellDef>No</th>
        <td mat-cell *matCellDef="let file; let i = index">{{ i + 1 }}</td>
      </ng-container>

      <ng-container matColumnDef="fileName">
        <th mat-header-cell *matHeaderCellDef>Nama File</th>
        <td mat-cell *matCellDef="let file">
          <mat-icon class="file-icon">description</mat-icon>
          {{ file.fileName }}
        </td>
      </ng-container>

      <ng-container matColumnDef="uploadDate">
        <th mat-header-cell *matHeaderCellDef>Tanggal Upload</th>
        <td mat-cell *matCellDef="let file">{{ file.uploadDate | date: 'dd/MM/yyyy HH:mm' }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>

    <p *ngIf="files.length === 0" class="empty-state">Belum ada file yang diupload.</p>
  </mat-card-content>
</mat-card>
