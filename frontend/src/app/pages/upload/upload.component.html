<mat-card class="upload-card">
  <mat-card-title>Upload Excel Pegawai</mat-card-title>
  <mat-card-content>
    <input type="file" accept=".xlsx,.xls" (change)="onFileSelected($event)" />
    <button mat-raised-button color="primary" (click)="upload()" [disabled]="!selectedFile">Upload</button>
  </mat-card-content>
</mat-card>

<table mat-table [dataSource]="files" class="mat-elevation-z2">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let row">{{ row.id }}</td>
  </ng-container>

  <ng-container matColumnDef="fileName">
    <th mat-header-cell *matHeaderCellDef>Nama File</th>
    <td mat-cell *matCellDef="let row">{{ row.fileName }}</td>
  </ng-container>

  <ng-container matColumnDef="filePath">
    <th mat-header-cell *matHeaderCellDef>Path</th>
    <td mat-cell *matCellDef="let row">{{ row.filePath }}</td>
  </ng-container>

  <ng-container matColumnDef="uploadDate">
    <th mat-header-cell *matHeaderCellDef>Tanggal Upload</th>
    <td mat-cell *matCellDef="let row">{{ row.uploadDate }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
