<div class="page-header">
  <h2><mat-icon>business</mat-icon> Data Cabang</h2>
  <button mat-raised-button color="primary" (click)="openForm()">
    <mat-icon>add</mat-icon>
    Tambah Cabang
  </button>
</div>

<mat-card>
  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="full-width">
      <ng-container matColumnDef="no">
        <th mat-header-cell *matHeaderCellDef>No</th>
        <td mat-cell *matCellDef="let r; let i = index">{{ i + 1 }}</td>
      </ng-container>

      <ng-container matColumnDef="kodeCabang">
        <th mat-header-cell *matHeaderCellDef>Kode Cabang</th>
        <td mat-cell *matCellDef="let r">{{ r.kodeCabang }}</td>
      </ng-container>

      <ng-container matColumnDef="namaCabang">
        <th mat-header-cell *matHeaderCellDef>Nama Cabang</th>
        <td mat-cell *matCellDef="let r">{{ r.namaCabang }}</td>
      </ng-container>

      <ng-container matColumnDef="aksi">
        <th mat-header-cell *matHeaderCellDef>Aksi</th>
        <td mat-cell *matCellDef="let r">
          <button mat-icon-button color="accent" (click)="openForm(r)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(r)" matTooltip="Hapus">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>

    <p *ngIf="dataSource.length === 0" class="empty-state">Tidak ada data cabang.</p>
  </mat-card-content>
</mat-card>
